<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="HIT Log">
<meta name="theme-color" content="#FBF6EE">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>HIT Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,500;0,600;0,700;0,800;0,900;1,800;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ============ HOME ============ -->
<div class="view active" id="view-home">
  <div class="appbar">
    <h1>HIT Log</h1>
    <span class="sub num" id="home-count"></span>
  </div>

  <div class="eyebrow">Up next</div>
  <div class="card next-card" id="next-card"></div>

  <div class="eyebrow">Workouts</div>
  <div class="wo-grid" id="wo-grid"></div>

  <div class="eyebrow">Calendar</div>
  <div class="card">
    <div class="cal-head">
      <span class="cal-title" id="cal-title"></span>
      <span class="cal-nav">
        <button class="btn small" id="cal-prev">‹</button>
        <button class="btn small" id="cal-next">›</button>
      </span>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="eyebrow">Data</div>
  <div class="card" style="display:flex; gap:8px; flex-wrap:wrap;">
    <button class="btn" id="btn-export">Export JSON</button>
    <button class="btn" id="btn-copy">Copy for Claude</button>
    <button class="btn" id="btn-import">Import</button>
  </div>
  <div class="footer-note">All data is stored on this device. Export regularly as a backup.</div>
</div>

<!-- ============ WORKOUT ============ -->
<div class="view" id="view-workout">
  <div class="session-bar">
    <button class="btn small ghost danger" id="btn-discard" title="Discard workout">✕</button>
    <span class="sb-name" id="sb-name"></span>
    <span class="sb-clock num" id="sb-clock">0:00</span>
    <button class="btn small" id="btn-wake" title="Keep screen awake">☾</button>
    <button class="btn small primary" id="btn-finish">Finish</button>
  </div>
  <div id="ex-list"></div>
  <div class="workout-pad"></div>
  <div class="rest-bar" id="rest-bar">
    <div class="fill" id="rest-fill"></div>
    <div class="rest-inner">
      <span class="rt-label">Rest</span>
      <span class="rt-time num" id="rest-time">2:00</span>
      <button class="btn" id="btn-rest">Start rest</button>
    </div>
  </div>
</div>

<!-- ============ EDIT ============ -->
<div class="view" id="view-edit">
  <div class="session-bar">
    <button class="btn small" id="btn-edit-back">‹ Back</button>
    <span class="sb-name" id="edit-title"></span>
    <button class="btn small primary" id="btn-add-ex">+ Add</button>
  </div>
  <div class="card" id="edit-list"></div>
  <div class="footer-note">Rename keeps an exercise's history. To swap in a different movement, delete it and add the new one so its history starts fresh.</div>
</div>

<!-- ============ MODALS ============ -->
<div class="modal-wrap" id="modal-wrap">
  <div class="modal" id="modal-body"></div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ================= data ================= */
const LS_KEY = "hitlog.v1";
const REST_SECONDS = 120;

function mkEx(id, name, warmTargets, workTarget, repsOnly){
  const sets = warmTargets.map(t => ({type:"warm", target:t}));
  sets.push({type:"work", target:workTarget});
  return {id, name, sets, repsOnly: !!repsOnly};
}
function defaultProgram(){
  return [
    {id:"w1", name:"Shoulders · Traps · Triceps · Abs", color:"#E0A83C", exercises:[
      mkEx("mach-shoulder-press","Machine Shoulder Press",["12","10"],"8-10"),
      mkEx("db-lateral-raise","Dumbbell Lateral Raise",["10"],"6-8"),
      mkEx("cable-one-arm-lateral","Cable One-Arm Lateral Raise",["10"],"6-8"),
      mkEx("db-shrug","Dumbbell Shrug",["10"],"6-8"),
      mkEx("cable-pushdown","Cable Pushdown",["12","10"],"6-8"),
      mkEx("bb-lying-tri-ext","Barbell Lying Tricep Extension",["10"],"6-8"),
      mkEx("cable-one-arm-pushdown","Cable One-Arm Pushdown",[],"6-8"),
      mkEx("roman-chair-situp","Roman Chair Sit-Up",[],"20",true),
      mkEx("crunch","Crunch",[],"20",true),
      mkEx("reverse-crunch","Reverse Crunch",[],"10",true),
    ]},
    {id:"w2", name:"Back · Rear Delts", color:"#5B8DEF", exercises:[
      mkEx("close-grip-pulldown","Close Grip Pulldown",["12","10"],"6-8"),
      mkEx("trap-bar-deadlift","Trap Bar Deadlift",["8"],"6-8"),
      mkEx("db-pullover","Dumbbell Pullover",["10"],"6-8"),
      mkEx("t-bar-row","T-Bar Machine Row",["10"],"6-8"),
      mkEx("db-bent-over-row","Dumbbell Bent-Over Row",["10"],"6-8"),
      mkEx("cable-seated-row","Cable Seated Row",[],"6-8"),
      mkEx("reverse-pec-deck","Reverse Pec Deck",[],"8-12"),
      mkEx("db-reverse-fly","Dumbbell Reverse Flye",[],"12-15"),
      mkEx("back-extension","Back Extension",[],"6-8"),
    ]},
    {id:"w3", name:"Chest · Biceps · Abs", color:"#E24545", exercises:[
      mkEx("mach-incline-press","Machine Incline Press",["12","10","6-8"],"6"),
      mkEx("mach-chest-press","Machine Chest Press",["10"],"6-8"),
      mkEx("pec-deck","Pec Deck",["10"],"8"),
      mkEx("cable-crossover","Cable Cross-Over",[],"8-10"),
      mkEx("db-incline-curl","Dumbbell Incline Curl",["10"],"6-8"),
      mkEx("bb-curl","Barbell Curl",["10"],"6-8"),
      mkEx("mach-preacher-curl","Machine Preacher Curl",[],"6-8"),
      mkEx("roman-chair-situp","Roman Chair Sit-Up",[],"20",true),
      mkEx("crunch","Crunch",[],"20",true),
      mkEx("reverse-crunch","Reverse Crunch",[],"10",true),
    ]},
    {id:"w4", name:"Legs", color:"#3FA36C", exercises:[
      mkEx("leg-extension","Machine Leg Extension",["15","12"],"10-12"),
      mkEx("leg-press","Leg Press",["12","12"],"10-12"),
      mkEx("hack-squat","Hack Squat",["12"],"8-10"),
      mkEx("leg-curl","Machine Leg Curl",["8-10"],"8-10"),
      mkEx("glute-bridge-machine","Glute Bridge Machine",["10"],"10"),
      mkEx("single-leg-curl","Single-Leg Leg Curl",[],"8-10"),
      mkEx("standing-calf-raise","Standing Calf Raise",["10-12"],"10-12"),
      mkEx("seated-calf-raise","Seated Calf Raise",[],"10-12"),
    ]},
  ];
}


/* form guides, keyed by exercise id — condensed from the Blood & Guts form report */
const FORM = {
"mach-shoulder-press":{s:"Seated upright, lower back supported on the pad, handles at roughly upper-chin/shoulder height. Elbows slightly forward of the torso, not flared straight out to the sides.",c:"Press up in a controlled arc, bringing the weight up and slightly in to keep tension on the delts and off the triceps. Stop just short of a hard elbow lockout, then lower under control to ear/chin level. The fixed path locks you in, so this is the safe place to push a press to genuine failure.",br:"Exhale pressing up, inhale lowering.",a:"Bouncing out of the bottom, flaring the elbows fully sideways (impingement risk), locking out and resting at the top, arching the low back to turn it into an incline press.",y:"Yates switched from heavy dumbbells to machine/Smith pressing because getting 70+ kg dumbbells into position was 'awkward and dangerous' — the machine let him set up cheaply and go to failure. Seated, always, to remove leg drive."},
"db-lateral-raise":{s:"Seated to kill momentum, torso upright, dumbbells at your sides, a slight fixed bend in the elbows to spare the joint. Palms facing down throughout.",c:"Lead with the elbows and raise out to the side to shoulder height — parallel and no higher. Yates: palms-down keeps the work on the lateral head; letting the thumbs turn up shifts it to the front delt. Control the descent fully.",br:"Exhale up, inhale down.",a:"Swinging or body English, going above parallel (traps take over), shrugging during the raise, tipping the dumbbells at the top, turning it into a front raise.",y:"At failure Yates kept going with partials — three-quarter reps, then half, then quarter — until the delt was completely done. He preferred dumbbells here for the natural range."},
"cable-one-arm-lateral":{s:"Stand side-on to a low pulley, handle in the outside hand, slight lean away from the stack, slight fixed elbow bend.",c:"The cable keeps constant tension through the whole arc — exactly what dumbbells lack near the bottom — which is why it follows the dumbbell raise. Lead with the elbow to shoulder height, then a slow, deliberate negative. The delt is pre-fatigued, so the load stays modest.",br:"Exhale up, inhale down.",a:"Torso swing, reaching with the hand instead of leading with the elbow, letting the cable snap the arm back down.",y:"On the final reps Yates had a partner assist the positive while he fought the negative — the eccentric is where this movement earns its keep."},
"db-shrug":{s:"Dumbbells at your sides, feet hip-width, torso leaning slightly forward — not bolt upright — with a long neutral spine, chin tucked, core braced. Straps are fine so grip never limits the traps.",c:"Yates cue: shrug up AND back, not straight up. 'The traps run down your back' — the up-and-back line recruits the mid and lower fibres too. Hold the top squeeze 1-2 s, then lower under control into a full stretch.",br:"Exhale up, inhale down.",a:"Pure vertical shrugging, rolling the shoulders (adds nothing), locking the elbows dead straight, bending them into an upright row, rounding the lower back on the forward lean.",y:"He moved from a ~270 kg barbell shrug to dumbbells after a forearm injury — and found the greater range grew his traps more. Range beats load here."},
"cable-pushdown":{s:"Face the stack with a slight forward lean, upper arms glued to your sides — 'glued to your lats' in Yates' words. He hung a 20 kg plate off a belt to anchor himself.",c:"Press down and back with a hard squeeze to full elbow extension, then control the return without letting the stack drag the elbows up. Yates: travelling below mid-chest on the release adds tendon stress, not muscle work.",br:"Exhale pressing down, inhale returning.",a:"Elbows drifting forward or flaring, leaning bodyweight onto the bar, overextending past useful tension, letting the weight yank the arms back up.",y:"His triceps opener: two warm-ups, one all-out set, partner-assisted forced reps at the end."},
"bb-lying-tri-ext":{s:"Flat bench, EZ-curl bar — Yates: it 'takes stress off the wrists and elbows.' Elbows pointing up and held immobile. Spotter on hand, always.",c:"Lower the bar to the forehead with the elbows fixed and pointing up (this biases the long head), then extend smoothly. Slow negative, no bounce. Yates: 'I've seen many people turn this into a close-grip bench press by using sloppy form. Avoid doing that.'",br:"Inhale lowering, exhale extending.",a:"Elbows drifting back or flaring wide, bouncing off the forehead, going heavy without a spotter, rushing the eccentric.",y:"This is the lift on which Yates tore his triceps 90% three weeks before the 1997 Olympia. Full warm-ups, total control, and a bias toward slightly higher reps are non-negotiable here."},
"cable-one-arm-pushdown":{s:"Single D-handle, underhand (supinated) grip, upper arm pinned to your side, slight forward lean.",c:"The reverse grip and single-arm path give a long range and bias the medial head. Press to full extension, hard squeeze, slow negative. Low elbow strain makes this the safe place to push well past failure.",br:"Exhale down, inhale up.",a:"Torso rotating to help, elbow drifting off the ribs, letting the stack win the negative.",y:"His finisher — 'last set, make it count.' Extra negatives are fine here precisely because the joint is protected."},
"roman-chair-situp":{s:"Feet anchored, hands crossed on the chest — never behind the neck.",c:"Full but controlled range, no swing. Exhale hard and squeeze at the top of every rep; the contraction is the point, not the count.",br:"Forceful exhale at the peak contraction.",a:"Momentum, jerking, hip-flexor heaving, pulling on the head.",y:"Yates kept abs to bodyweight contraction work at ~20 reps to failure — weighted ab work made his midsection blocky."},
"crunch":{s:"On the floor, knees bent, hands lightly at the chest or temples.",c:"Curl the ribcage toward the pelvis — a short range of spinal flexion, not a sit-up. Yates: squeeze so hard the abs are 'on the verge of cramping,' with a big exhalation at the peak. Slow, controlled descent.",br:"Big exhale at the top, inhale down.",a:"Pulling on the neck, using momentum, lengthening it into a full sit-up.",y:"The near-cramp isometric squeeze is the whole exercise. About 20 reps to failure."},
"reverse-crunch":{s:"On your back, hands by your sides or gripping a bench behind your head.",c:"Curl the hips and knees toward the chest, lifting the hips off the floor with control, then lower slowly. Less lumbar flexion than a sit-up — the back-friendly abs movement.",br:"Exhale curling up, inhale lowering.",a:"Swinging the legs for momentum, dropping the hips fast, arching off the bottom.",y:"Yates ran these at 10-15 controlled reps — 'control both the lift and descent.'"},
"close-grip-pulldown":{s:"Thighs locked under the pads, close underhand grip. Yates: it gives 'the most complete range of motion for the lats' and puts the biceps in their strongest pulling position. Chest up, slight backward lean, head up.",c:"Drive the elbows down and back — do not pull with the hands. Bar to the upper chest, squeeze the lats and hold ~1 s: 'if you can't hold it, you used momentum.' Full stretch at the top, and never let the stack touch down between reps.",br:"Exhale pulling down, inhale returning.",a:"Torso heaving, biceps-yanking, a wide grip (the weaker biceps fail before the lats are worked), skipping the peak hold.",y:"Comes after the pullover pre-exhaust, so the lats reach failure before the biceps become the weak link."},
"trap-bar-deadlift":{s:"Centred in the hex bar, feet hip- to shoulder-width, midfoot under you. High handles — shorter range, more upright torso. Hinge back and bend the knees until hands meet handles with a braced neutral spine: ribs stacked over pelvis, chest proud, lats packed, gaze slightly ahead on the floor.",c:"Brace as if about to take a punch, then push the floor away. Stand tall to a neutral lockout — glutes squeezed, no lean-back. Reset from a full dead stop on the floor every rep and re-brace, so each pull starts from a fresh neutral spine instead of a bounce.",br:"Braced breath held through the pull, exhale near lockout, re-breathe on the floor between reps.",a:"Rounding the lower back, hips shooting up first, hyperextending at the top, knees caving, trying to squat the bar up.",y:"Yates treated deadlifts as a continuous-tension erector exercise done comparatively light (~205 kg for 6-10) — never a max-effort power lift.",b:"Stop the set at the first hint of lumbar rounding — technical failure, not absolute failure. No forced reps under spinal load, ever. The centred trap-bar load already cuts lumbar shear versus a straight bar; keep it that way."},
"db-pullover":{s:"Lie lengthwise ALONG a flat bench, head supported — not the hips-dropped across-bench style, which demands lumbar extension. Feet flat, ribs down, core lightly braced so the low back keeps gentle contact with the bench. Cup one dumbbell by the inner plate, both palms, arms over the chest with a fixed slight elbow bend.",c:"Lower the dumbbell in an arc back behind the head until you feel a deep stretch through the lats — that loaded stretch is the entire point, and what the low cable could not give. Pause briefly (no bounce), then pull back over the chest with the lats — think upper arms moving down and back relative to the torso — and squeeze. Range ends at the lat stretch, never at lumbar extension.",br:"Deep inhale lowering into the stretch, exhale pulling over.",a:"Ribcage flaring and low back arching to fake extra range (the one back risk — ribs down is the guard-rail), bending and straightening the elbows into a triceps extension, rushing the stretch, loads too heavy to control in the stretched position.",y:"The closest free-weight stand-in for Yates' beloved Nautilus pullover: an isolated lat/teres pre-exhaust with a loaded stretch, done before the pulls so the biceps never limit the lats. Moderate weight — the job is stretch and pre-exhaust, not load.",b:"If the low back wants to arch in the stretch, you have gone too deep or too heavy. Shoulders unhappy overhead? The fallback is a kneeling cable pullover, not the standing version."},
"t-bar-row":{s:"Chest glued to the pad throughout, feet stable on the platform. Neutral/close grip is the nearest analogue to Yates' underhand row; the wide pronated grip biases upper back and rear delts. Pad height set so the handles land at the lower chest/upper abdomen when contracted. Full stretch to start, shoulders allowed to protract slightly.",c:"Initiate with the lats — drive the elbows back and slightly in toward the hips, pull to the end of the machine's clean range, hold the squeeze ~1 s ('if you can't hold it, you used momentum'), then lower under full control to a complete stretch. No slamming, no bouncing, continuous tension. Because the chest pad removes the hinge, genuine failure — even forced reps or rest-pause — is safe here in a way it never is on a free-standing row.",br:"Exhale pulling, inhale returning — no heavy held brace needed; that is part of the appeal.",a:"Chest pushing off the pad to heave extra plates (this quietly reintroduces the lumbar load the machine exists to remove — if the chest leaves the pad, the weight is too heavy), stacking plates until the range collapses to half-reps, shrugging toward the ears, yanking with the biceps, dropping the negative.",y:"Yates leaned increasingly on chest-supported machine rows — Hammer Strength one-arm rows especially — for exactly this: pattern overload without spinal load. This swap is fully in the spirit of the programme.",b:"With the chest on the pad the lumbar spine is almost entirely out of the lift — the back-friendliest heavy row there is. A landmine-style T-bar with no chest pad is a different animal: treat that like the barbell Yates row, braced and stopped at technical failure."},
"db-bent-over-row":{s:"One hand and knee on a bench, other foot planted, flat neutral back, dumbbell hanging from the shoulder.",c:"Yates cue: 'start in line with the shoulder, pull up and back — into the hip.' Drive the elbow up and back toward the hip, squeeze, lower to a full stretch. Torso stays stone still.",br:"Exhale pulling, inhale lowering.",a:"Torso rotation, jerking, rounding the back, yanking the dumbbell high to the chest instead of back to the hip.",y:"The supported position removes lumbar loading — Yates alternated it with barbell rowing 'to achieve a balanced back.'"},
"cable-seated-row":{s:"Feet braced, slight knee bend, tall braced torso, shoulder-width grip on the triangle or bar.",c:"Engage the back before the first pull. Handle to the abdomen, elbows driving back, blades squeezing together, pause — then return under control to a full stretch without the stack touching down. A small controlled lean is fine; heaving is not.",br:"Exhale pulling in, inhale returning.",a:"Big torso swing (lumbar risk), rounding on the stretch, pulling with the biceps, no peak squeeze.",y:"Late in the workout the lats are cooked — less weight does the job. Yates pulled to the abdomen, shoulder-width."},
"reverse-pec-deck":{s:"Face the pad, chest glued to it, torso upright. Handles set so the arms travel a horizontal arc at shoulder height, hands in line with elbows and shoulders, fixed slight elbow bend.",c:"Shoulders down — no shrug. Push the handles out and back in a wide arc to full rear-delt contraction, hold the peak ~1 s ('if you can't hold it, you used momentum'), control the return, stack never touches down. Elbows lead, not hands. The chest support means nothing can move — the safe place to take rear delts to true failure and extend with partials.",br:"Exhale opening out, inhale returning.",a:"Trap takeover, changing the elbow angle mid-rep, swinging past the frontal plane, loads so heavy the arc shortens and the connection disappears.",y:"The main rear-delt working set — roughly 8-12 to failure, strict. Rear delts live on back day because they assist every row."},
"db-reverse-fly":{s:"Take the lumbar spine out entirely — after the deadlift and rows the erectors are already taxed, so never do these free-standing. Either seated bent-over (Yates' style): chest folded down onto the thighs and kept there, dumbbells hanging under the shoulders, palms facing each other. Or chest-supported: prone on a ~30 degree incline bench, arms hanging. Fixed slight elbow bend either way.",c:"With the torso locked, raise the dumbbells out to the sides leading with the elbows, to parallel with the floor and no higher — above that the traps take over. Squeeze at the top, then lower under full control into a deep stretch. The free path and stretched bottom are what dumbbells add over the machine. Pre-fatigued from the pec deck, the weight will be light — that is correct, not a problem.",br:"Exhale raising, inhale lowering.",a:"Chest lifting off the thighs/bench to heave (momentum plus lumbar load), swinging, shrugging, raising above parallel, bending the elbows further mid-rep into a row.",y:"The second of Yates' two rear-delt movements — machine plus dumbbell rear lateral. 12-15 strict reps as the end-of-session finisher; clean-form failure, no forced reps needed.",b:"The chest-on-thighs or incline-bench position is the entire back-protection strategy — if the torso stays locked, the lumbar spine does nothing."},
"back-extension":{s:"Pad adjusted so the hip crease sits just above the top edge, ankles anchored, arms crossed on the chest. Add a small plate only once bodyweight is easy. Core braced.",c:"Hinge down at the hips with a neutral spine until you feel the hamstring/erector stretch, then rise using glutes, hamstrings and erectors — and STOP when the body forms a straight line. Hold that neutral top statically for 2-3 s as the squeeze, then a controlled 2-3 s descent. Chase the hold, not extra range.",br:"Inhale lowering, exhale rising.",a:"Arching past neutral at the top — the main injury risk here — rounding on the descent, jerking up, loading plates before bodyweight is owned.",y:"Yates credited the hyperextension station for his erectors and did these before deadlifts. For a lower-back history the smarter order is reversed: light trap-bar deadlift first while fresh, static-hold extensions after — never hinge heavy on pre-exhausted erectors.",b:"Never hyperextend under load. Straight line, hold, down. That is the entire movement."},
"mach-incline-press":{s:"Handles at upper-chest height, back flat on the pad. Yates set inclines shallow — around 30 degrees, not 45 — 'to ensure the resistance is placed on your pecs; a steeper incline shifts the emphasis to the front delts.'",c:"Deep stretch at the bottom, then drive smoothly and strongly — 'slow and precise on the way down, explosive on the way up' — stopping just short of lockout so the pecs never rest. Elbows about 45 degrees from the torso.",br:"Inhale lowering, exhale pressing.",a:"Bouncing out of the stretch, flaring the elbows to 90 degrees, locking out and resting, setting the incline too steep.",y:"Rest-pause is his extender of choice on machine presses: rack it, three deep breaths, one or two more reps. The fixed path makes past-failure work safe."},
"mach-chest-press":{s:"Seat set so the handles align mid-chest, shoulder blades retracted and pinned to the pad.",c:"Press forward and slightly in, stop short of a hard lockout, control the return into a genuine chest stretch. Yates: machines' stability 'allows for a controlled range of motion and targeted isolation' — meaning true failure, safely.",br:"Exhale pressing, inhale returning.",a:"Shoulders rolling forward off the pad, partial range, momentum, lockout resting.",y:"The second press — the pecs are pre-fatigued, so moderate loads reach failure. Another good rest-pause candidate."},
"pec-deck":{s:"Handles/pads at mid-chest, back flat, feet planted, shoulders down and slightly retracted. Start from a comfortable stretch — not an aggressive one.",c:"Hug-a-tree squeeze: bring the pads together with the pecs, hold the peak contraction, then control the opening back to the stretch without letting the stack drag you deeper than comfort. Grip the handles lightly so the forearms stay out of it.",br:"Exhale closing, inhale opening.",a:"Over-deep stretching under load (shoulder strain), bending and extending the elbows into a press, shrugging, letting the arms snap back.",y:"Yates used flyes to take the delts and triceps 'almost fully out of the equation' — pure pec isolation between the presses and the cables."},
"cable-crossover":{s:"Pulleys at or slightly above shoulder height, one handle each hand, split stance, slight forward lean, fixed slight elbow bend.",c:"Bring the hands together in an arc in front of the chest and squeeze hard at full adduction — think elbows toward each other at the finish to fully shorten the pecs. Full stretch on the return. Cables hold tension in the shortened position where dumbbells lose it — this is a peak-contraction movement.",br:"Exhale bringing the hands together, inhale opening.",a:"Bending the elbows into a press, leaning bodyweight through it, skipping the squeeze, snapping back to the stretch.",y:"His chest finisher — around 13 reps to failure plus forced reps. Chase the squeeze, not the stack."},
"db-incline-curl":{s:"Bench at 45-60 degrees, arms hanging back behind the torso for the fullest biceps stretch, dumbbells starting neutral or slightly supinated.",c:"Curl with absolutely no swing, supinating the wrist on the way up, big squeeze at the peak, then a slow negative — Yates: 'it is the negative phase that is key.' The behind-the-body start keeps tension on the stretched biceps.",br:"Exhale curling, inhale lowering.",a:"Momentum, cutting the stretch short, skipping the supination, rushing the eccentric.",y:"Stretched-position biceps work first. And his standing warning: do not hammer biceps far past failure — 'too much stress on the fragile joint and muscle-fiber structure.' Stop at or barely past positive failure."},
"bb-curl":{s:"EZ bar (kinder to the wrists), shoulder-width underhand grip, elbows tucked to the sides, core braced.",c:"Smooth arc with the elbows fixed at your sides, squeeze at the top, controlled descent to full extension. Yates: 'avoid cheating and swinging your body' — barbell curls invite body English; give them none.",br:"Exhale curling, inhale lowering.",a:"Hip heave, elbows drifting forward, half reps, dropping the negative.",y:"Yates sometimes ended this at plain positive failure — biceps do not get the past-failure treatment the big muscles do."},
"mach-preacher-curl":{s:"Seat set so the upper arms lie flat on the pad, armpits near its top edge, underhand grip.",c:"Curl, hold the peak, slow negative. The machine stabilises everything, which is exactly why Yates put his past-failure biceps work here: 'if it's a machine, it's safe' for extra negatives.",br:"Exhale curling, inhale lowering.",a:"Elbows lifting off the pad, bouncing out of the stretched bottom (elbow strain), cutting the top short.",y:"The finisher — controlled negatives and a held contraction with the joints protected."},
"leg-extension":{s:"Seat set so the knee joint lines up with the machine pivot, pad on the lower shin, hands on the seat handles.",c:"Extend to full lockout with a sharp 1 s hold at the top — Yates: 'full reps from maximum stretch to maximum contraction,' every rep. Control the descent completely; the stack never slams.",br:"Exhale extending, inhale lowering.",a:"Partial going-through-the-motions reps, no peak hold, dropping the weight, bouncing the torso for momentum.",y:"The quad pre-exhaust, done first so the quads — not the hips — are the failure point on the presses that follow. Failure and beyond is welcome here."},
"leg-press":{s:"Feet shoulder-width, mid-platform. Backrest set low. Glutes and entire lower back pressed hard into the pad — grip the handles and pull yourself down into the seat before the first rep.",c:"Lower the sled over 2-3 s only as deep as the lower back stays flat on the pad — about 90 degrees at the knee for most people — then drive up smoothly with no lockout snap, keeping a soft knee at the top for continuous tension. Knees track over the toes.",br:"Inhale lowering, exhale pressing, core braced throughout.",a:"Depth past the neutral-spine limit, knees caving, hands pushing on the knees, ego loading that destroys the tempo.",y:"Yates worked to ~574 kg for 10-12 here precisely because the leg press overloads the quads 'without putting your back at risk, as a squat may.' Narrow-ish stance for quads.",b:"The moment the pelvis tucks and the low back peels off the pad, the rep went too deep — that position under load is the disc risk. Cap the depth. This rule is non-negotiable; if the butt lifts, reduce depth or raise the backrest."},
"hack-squat":{s:"Shoulders under the pads, back flat against the pad, feet shoulder-width or slightly narrower (Yates went narrower to bias the quads), core braced.",c:"Control the descent with knees tracking over the toes, going only as deep as the lower back stays glued to the pad. Drive up through the whole foot, full range, no lockout-and-rest. Yates: 'every rep counts — no cutting corners.'",br:"Inhale down, exhale up, braced throughout.",a:"Depth that tucks the pelvis, heels lifting, knees caving, bouncing out of the bottom.",y:"Yates replaced barbell squats with the hack squat and leg press after hip trouble — supported-back quad loading, up to ~299 kg for 8-10, third in the pre-exhaust chain so moderate loads suffice.",b:"Pelvic tuck against the pad = too deep. Same non-negotiable depth cap as the leg press."},
"leg-curl":{s:"Pad just above the heels, knee joint at the machine pivot. Lying version: hips stay pressed down. Seated version: thigh pad snug.",c:"Curl the heels to the glutes with a hard squeeze, full range, slow negative, and constant tension — Yates 'never let the weight rest at any point.'",br:"Exhale curling, inhale lowering.",a:"Hips popping up on the lying curl (a momentum cheat that loads the low back), partial range, slamming the negative, overloading.",y:"The hamstring pre-exhaust before the hip-hinge glute work. Hips pinned is both the strictness cue and the back protection."},
"glute-bridge-machine":{s:"Back and shoulders on the pad, feet flat roughly hip-width, shins near vertical so the knees sit at about 90 degrees over the ankles at the top. Belt/pad across the hip crease — not the stomach. Core braced, chin gently tucked.",c:"Drive through the heels and extend the hips to a straight line — thighs and torso in one plane — finishing with a hard 1-2 s glute squeeze and a slight tailbone tuck. That posterior tilt is the key cue: the finish comes from the glutes, never from arching the lumbar spine. Lower over 2-3 s and stop just short of resting at the bottom.",br:"Exhale driving up, inhale lowering.",a:"Finishing with a low-back arch and rib flare instead of the glute squeeze, pushing through the toes, feet placed too low (quad takeover) or too high (hamstring takeover), craning the neck, bouncing.",y:"Not a Yates-era movement — this is evidence-based technique run inside his framework: controlled negative, held peak, one all-out set. Chase the squeeze, not the load.",b:"Lockout ends at a straight line with a squeeze, never an arch. If you feel the top of the rep in the lower back, you are hyperextending — re-cue the tailbone tuck and shorten the range. Load rides horizontally on the hips, so done right this is one of the most back-friendly hinges available."},
"single-leg-curl":{s:"As the leg curl, one leg at a time — pad above the heel, hips and thigh pinned.",c:"Strict single-leg curls expose and fix left-right imbalances. Hard squeeze at the top, slow negative; unilateral and light makes staying strict easy.",br:"Exhale curling, inhale lowering.",a:"Hiking the hip of the working side, momentum, partial range.",y:"Yates added these after bilateral curls specifically 'to address any imbalances between sides.'"},
"standing-calf-raise":{s:"Shoulders under the pads, balls of the feet on the platform edge, heels hanging free, knees locked — straight legs put the work on the gastrocnemius.",c:"Drop the heels below the platform into a deep stretch, then drive up onto the balls of the feet to full height with a 1-2 s squeeze at the top. Slow and controlled — never bounce off the Achilles stretch reflex.",br:"Exhale up, inhale down.",a:"Bouncing the stretch reflex, partial range at either end, bending the knees (soleus takeover), loads so heavy the range collapses.",y:"'Train them like any other muscle group — heavy to failure,' with exaggerated range. Yates claimed ~590 kg for 10-12 slow reps. Full stretch plus full squeeze is the entire game; lengthened partials after failure are a valid extender."},
"seated-calf-raise":{s:"Thigh pad snug just above the knees, balls of the feet on the platform, knees bent about 90 degrees — the bent knee targets the soleus.",c:"Lower to a full stretch below the platform, pause, then rise to full height and squeeze. Yates: 'sit on the balls of your feet so you can get a good stretch.' Controlled tempo, no bouncing.",br:"Exhale up, inhale down.",a:"Overloading into short pumpy reps, bouncing, pulling on the handles to cheat.",y:"Done after the standing raise — 'once the gastrocnemius is fatigued, it's easier to hit the soleus directly.' One warm-up, one heavy set to failure."},
"bent-over-row":{s:"Yates row: hinge to about 45 degrees — deliberately more upright than a classic row. Grip just outside the hips, head up for a slight arch, core braced hard.",c:"Initiate with the lats, elbows driving back, bar to the lower abdomen. Hold the squeeze ~1 s, control down, and the bar never touches the floor — continuous tension, isometric brace throughout.",br:"Braced breath through the pull, exhale at the top, breathe between reps.",a:"Standing so upright it becomes a shrug, rounding the lower back, torso heaving, biceps yanking.",y:"His signature lift — ~197 kg for 6-8 — but 'the weight is always just a tool.' Underhand until his 1994 biceps tear, overhand after; use whichever suits you.",b:"The 45 degree angle is itself the back protection. Any rounding or heave is the stop signal — end the set. Chest-supported rowing is the sanctioned fallback, which is exactly why the T-bar machine now holds this slot."}
};

let state = load();
function migrate(s){
  try{
    const w4 = s.program.find(w => w.id === "w4");
    if(w4 && !w4.exercises.some(e => e.id === "glute-bridge-machine")){
      const i = w4.exercises.findIndex(e => e.id === "leg-curl");
      w4.exercises.splice(i >= 0 ? i + 1 : w4.exercises.length, 0,
        mkEx("glute-bridge-machine","Glute Bridge Machine",["10"],"10"));
      localStorage.setItem(LS_KEY, JSON.stringify(s));
    }
    const w2 = s.program.find(w => w.id === "w2");
    if(w2 && !w2.exercises.some(e => e.id === "t-bar-row")){
      const j = w2.exercises.findIndex(e => e.id === "bent-over-row");
      if(j >= 0){
        w2.exercises.splice(j, 1, mkEx("t-bar-row","T-Bar Machine Row",["10"],"6-8"));
        localStorage.setItem(LS_KEY, JSON.stringify(s));
      }
    }
    if(w2){
      const cp = w2.exercises.findIndex(e => e.id === "cable-pullover");
      if(cp >= 0 && !w2.exercises.some(e => e.id === "db-pullover")){
        w2.exercises.splice(cp, 1, mkEx("db-pullover","Dumbbell Pullover",["10"],"6-8"));
        localStorage.setItem(LS_KEY, JSON.stringify(s));
      }
      const hf = w2.exercises.findIndex(e => e.id === "rear-delt-hammer-fly");
      if(hf >= 0 && !w2.exercises.some(e => e.id === "db-reverse-fly")){
        w2.exercises.splice(hf, 1);
        const rp = w2.exercises.findIndex(e => e.id === "reverse-pec-deck");
        w2.exercises.splice(rp >= 0 ? rp + 1 : hf, 0, mkEx("db-reverse-fly","Dumbbell Reverse Flye",[],"12-15"));
        localStorage.setItem(LS_KEY, JSON.stringify(s));
      }
    }
  }catch(e){}
}
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const s = JSON.parse(raw); if(s && s.program){ migrate(s); return s; } }
  }catch(e){}
  return {program: defaultProgram(), sessions: [], active: null};
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

/* ================= helpers ================= */
const $ = id => document.getElementById(id);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const slug = s => s.toLowerCase().trim().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"") || uid();
const fmtClock = s => Math.floor(s/60) + ":" + String(Math.floor(s%60)).padStart(2,"0");
const fmtDate = d => d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
function fmtDur(ms){ const m = Math.round(ms/60000); return m >= 60 ? Math.floor(m/60)+"h "+(m%60)+"m" : m+"m"; }
function toast(msg){ const t = $("toast"); t.textContent = msg; t.classList.add("show"); clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove("show"), 2200); }
function fmtVal(set){
  if(set.weight !== "" && set.weight != null && set.reps !== "" && set.reps != null) return set.weight + "×" + set.reps;
  if(set.reps !== "" && set.reps != null) return "×" + set.reps;
  return null;
}
function completedSessions(){ return state.sessions.filter(s => s.endedAt); }

/* last N logged values for a given exercise + set index (oldest→newest) */
function setHistory(exId, setIdx, n){
  const out = [];
  const sessions = completedSessions();
  for(let i = sessions.length - 1; i >= 0 && out.length < n; i--){
    const ex = sessions[i].exercises.find(e => e.exId === exId);
    if(!ex) continue;
    const st = ex.sets[setIdx];
    if(st && st.done){ const v = fmtVal(st); if(v) out.push(v); }
  }
  return out.reverse();
}
/* most recent logged sets for an exercise (for prefill) */
function lastSets(exId){
  const sessions = completedSessions();
  for(let i = sessions.length - 1; i >= 0; i--){
    const ex = sessions[i].exercises.find(e => e.exId === exId);
    if(ex && ex.sets.some(s => s.done)) return ex.sets;
  }
  return null;
}
function nextWorkoutIndex(){
  const done = completedSessions();
  if(!done.length) return 0;
  const lastId = done[done.length-1].workoutId;
  const idx = state.program.findIndex(w => w.id === lastId);
  return idx < 0 ? 0 : (idx + 1) % state.program.length;
}

/* ---------- home ---------- */
let calCursor = new Date();
function renderHome(){
  const done = completedSessions();

    $("next-card").innerHTML =

    renderCalendar(); return;
  }

    '<div><div class="nc-label">Next in cycle</div>' +
    '<div class="nc-name">' + esc(w.name) + '</div>' +
    '<div class="nc-meta">' + (last ? "Last session: " + last.date + " · " + esc(last.workoutName) : "No sessions yet — first of the cycle") + '</div></div>' +

  const grid = $("wo-grid");

  state.program.forEach(wo => {

    card.className = "wo-card";
    card.innerHTML =
      '<span class="dot" style="background:' + wo.color + '"></span>' +
      '<span class="wo-name">' + esc(wo.name) + '</span>' +
      '<span class="wo-meta">' + wo.exercises.length + ' exercises' + (lastFor ? ' · last ' + lastFor.date.slice(5) : '') + '</span>' +
      '<span class="wo-actions">' +
        '<button class="btn small" onclick="startWorkout(\'' + wo.id + '\')">Start</button>' +
        '<button class="btn small ghost" onclick="openEdit(\'' + wo.id + '\')">Edit</button>' +
      '</span>';
    grid.appendChild(card);
  });
  renderCalendar();
}
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function renderCalendar(){
  const y = calCursor.getFullYear(), m = calCursor.getMonth();
  $("cal-title").textContent = calCursor.toLocaleDateString(undefined, {month:"long", year:"numeric"});
  const byDate = {};
  completedSessions().forEach(s => { (byDate[s.date] = byDate[s.date] || []).push(s); });
  const woColor = {}; state.program.forEach(w => woColor[w.id] = w.color);

  const grid = $("cal-grid");
  grid.innerHTML = "";
  ["M","T","W","T","F","S","S"].forEach(d => { const el = document.createElement("div"); el.className = "cal-dow"; el.textContent = d; grid.appendChild(el); });
  const first = new Date(y, m, 1);
  let startOffset = (first.getDay() + 6) % 7; // Monday start
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const todayStr = fmtDate(new Date());
  for(let i = 0; i < startOffset; i++){ grid.appendChild(document.createElement("div")); }
  for(let d = 1; d <= daysInMonth; d++){
    const dateStr = fmtDate(new Date(y, m, d));
    const el = document.createElement("button");
    el.className = "cal-day in-month" + (dateStr === todayStr ? " today" : "") + (byDate[dateStr] ? " has-wo" : "");
    let dots = "";
    (byDate[dateStr] || []).slice(0,3).forEach(s => { dots += '<i style="background:' + (woColor[s.workoutId] || "#888") + '"></i>'; });
    el.innerHTML = '<span class="num">' + d + '</span><span class="dots">' + dots + '</span>';
    if(byDate[dateStr]) el.onclick = () => openDay(dateStr, byDate[dateStr]);
    grid.appendChild(el);
  }
}
$("cal-prev").onclick = () => { calCursor = new Date(calCursor.getFullYear(), calCursor.getMonth()-1, 1); renderCalendar(); };
$("cal-next").onclick = () => { calCursor = new Date(calCursor.getFullYear(), calCursor.getMonth()+1, 1); renderCalendar(); };

function openDay(dateStr, sessions){
  let html = '<h3>' + dateStr + '</h3>';
  sessions.forEach(s => {
    html += '<div class="day-session"><div class="ds-head"><span>' + esc(s.workoutName) + '</span><span class="num">' + (s.endedAt ? fmtDur(s.endedAt - s.startedAt) : "") + '</span></div>';
    s.exercises.forEach(ex => {
      const work = ex.sets.filter(st => st.type === "work" && st.done).map(fmtVal).filter(Boolean).join(", ");
      if(work) html += '<div class="ds-line">' + esc(ex.name) + ' — ' + work + '</div>';
    });
    html += '<div style="margin-top:6px"><button class="btn small ghost danger" onclick="deleteSession(\'' + s.id + '\')">Delete session</button></div></div>';
  });
  html += '<div class="modal-actions"><button class="btn" onclick="closeModal()">Close</button></div>';
  openModal(html);
}
function deleteSession(id){
  if(!confirm("Delete this session permanently?")) return;
  state.sessions = state.sessions.filter(s => s.id !== id);
  save(); closeModal(); renderHome();
}

/* ---------- workout session ---------- */
let clockInt = null, restInt = null, restEndsAt = null, wakeLock = null;

function startWorkout(woId){
  if(state.active){ resumeActive(); return; }
  const wo = state.program.find(w => w.id === woId);
  const session = {
    id: uid(), workoutId: wo.id, workoutName: wo.name,
    date: fmtDate(new Date()), startedAt: Date.now(), endedAt: null,
    exercises: wo.exercises.map(ex => {
      const prev = lastSets(ex.id);
      return { exId: ex.id, name: ex.name, repsOnly: !!ex.repsOnly,
        sets: ex.sets.map((s, i) => {
          const w = (!ex.repsOnly && prev && prev[i] && prev[i].weight != null) ? prev[i].weight : "";
          const r = (prev && prev[i] && prev[i].reps != null) ? prev[i].reps : "";
          return { type: s.type, target: s.target, weight: w, reps: r, done: false,
                   pre: { w: w !== "", r: r !== "" } };
        }) };
    })
  };
  state.active = session; save();
  show("view-workout"); renderWorkout(); startClock();
}

function progEx(exId){
  for(const w of state.program){ const e = w.exercises.find(x => x.id === exId); if(e) return e; }
  return null;
}
function editNote(exId){
  const pex = progEx(exId);
  if(!pex) return;
  openModal('<h3>' + esc(pex.name) + '</h3>' +
    '<div class="field"><label>Machine settings</label>' +
    '<input id="f-note" value="' + esc(pex.note || "") + '" placeholder="e.g. seat 4, pin 7, feet high">' +
    '<div class="hint">Shown under the exercise during workouts. Leave blank to remove.</div></div>' +
    '<div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button>' +
    '<button class="btn primary" onclick="saveNote(\'' + exId + '\')">Save</button></div>');
}
function saveNote(exId){
  const pex = progEx(exId);
  if(pex){ pex.note = $("f-note").value.trim(); save(); }
  closeModal();
  if(state.active){ const y = window.scrollY; renderWorkout(); window.scrollTo(0, y); }
}
function prevBest(exId){
  let bw = 0, bv = 0, br = 0;
  completedSessions().forEach(s => {
    const e = s.exercises.find(x => x.exId === exId);
    if(!e) return;
    e.sets.forEach(st => {
      if(st.type === "work" && st.done){
        const w = parseFloat(st.weight) || 0, r = parseFloat(st.reps) || 0;
        if(w > bw) bw = w;
        if(w * r > bv) bv = w * r;
        if(r > br) br = r;
      }
    });
  });
  return {bw, bv, br};
}
function prBadges(ex, si){
  const st = ex.sets[si];
  if(st.type !== "work" || !st.done) return "";
  const best = prevBest(ex.exId);
  const w = parseFloat(st.weight) || 0, r = parseFloat(st.reps) || 0;
  const out = [];
  if(ex.repsOnly){
    if(best.br > 0 && r > best.br) out.push("&#9650; most reps");
  }else{
    if(best.bw > 0 && w > best.bw) out.push("&#9650; heaviest");
    if(best.bv > 0 && w * r > best.bv) out.push("&#9650; best volume");
  }
  return out.map(t => '<span class="pr">' + t + '</span>').join("");
}
function renderWorkout(){
  const s = state.active; if(!s) return;
  $("sb-name").textContent = s.workoutName.split(" · ")[0];
  const list = $("ex-list");
  list.innerHTML = "";
  s.exercises.forEach((ex, ei) => {
    const card = document.createElement("div");
    card.className = "ex-card";
    const pex = progEx(ex.exId);
    let html = '<div class="ex-head"><span class="ex-name">' + esc(ex.name) +
               (FORM[ex.exId] ? '<button class="info-btn" onclick="showForm(\'' + ex.exId + '\')">i</button>' : '') +
               '<button class="info-btn" onclick="editNote(\'' + ex.exId + '\')">&#9998;</button></span>' +
               '<span class="ex-target">' + (ex.repsOnly ? "bodyweight" : "kg") + '</span></div>';
    if(pex && pex.note) html += '<div class="ex-note" onclick="editNote(\'' + ex.exId + '\')">' + esc(pex.note) + '</div>';
    ex.sets.forEach((st, si) => {
      const tag = st.type === "warm" ? '<span class="set-tag warm">W' + (si+1) + '</span>' : '<span class="set-tag work">WK</span>';
      html += '<div class="set-row">' + tag +
        (ex.repsOnly
          ? '<span style="text-align:center;color:var(--faint);font-size:12px;">—</span>'
          : '<input type="text" inputmode="decimal" placeholder="kg"' + (st.pre && st.pre.w && !st.done ? ' class="prefill"' : '') + ' value="' + esc(st.weight) + '" oninput="setVal(' + ei + ',' + si + ',\'weight\',this.value)" onfocus="preFocus(' + ei + ',' + si + ',\'weight\',this)" onblur="preBlur(' + ei + ',' + si + ',\'weight\',this)">') +
        '<span class="reps-wrap"><input type="text" inputmode="numeric" placeholder="' + esc(st.target) + '"' + (st.pre && st.pre.r && !st.done ? ' class="prefill"' : '') + ' value="' + esc(st.reps) + '" oninput="setVal(' + ei + ',' + si + ',\'reps\',this.value)" onfocus="preFocus(' + ei + ',' + si + ',\'reps\',this)" onblur="preBlur(' + ei + ',' + si + ',\'reps\',this)">' +
        '<i class="tgt">' + esc(st.target) + '</i></span>' +
        '<button class="chk' + (st.done ? " done" : "") + '" onclick="toggleDone(' + ei + ',' + si + ',this)">✓</button>' +
      '</div>';
      const hist = setHistory(ex.exId, si, 3);
      const pr = prBadges(ex, si);
      if(hist.length || pr) html += '<div class="set-hist">' + (hist.length ? '<b>prev</b> ' + hist.join(", ") : '') + pr + '</div>';
    });
    card.innerHTML = html;
    list.appendChild(card);
  });
  updateRestUI();
}
function preFocus(ei, si, field, el){
  const st = state.active.exercises[ei].sets[si];
  const k = field === "weight" ? "w" : "r";
  if(st.pre && st.pre[k] && !st.done && el.value !== ""){ el.value = ""; }
}
function preBlur(ei, si, field, el){
  const st = state.active.exercises[ei].sets[si];
  const k = field === "weight" ? "w" : "r";
  if(el.value === "" && st.pre && st.pre[k] && st[field] !== ""){
    el.value = st[field]; el.classList.add("prefill");
  }
}
function setVal(ei, si, field, val){
  const st = state.active.exercises[ei].sets[si];
  st[field] = val.trim();
  if(st.pre){ st.pre[field === "weight" ? "w" : "r"] = false;
    document.activeElement && document.activeElement.classList && document.activeElement.classList.remove("prefill"); }
  save();
}
function toggleDone(ei, si, btn){
  const st = state.active.exercises[ei].sets[si];
  st.done = !st.done;
  if(st.done){
    if(st.reps === "" && /^\d+(\.\d+)?$/.test(st.target)) st.reps = st.target;
    st.pre = null;
  }
  save();
  const y = window.scrollY;
  renderWorkout();
  window.scrollTo(0, y);
}

function startClock(){
  stopClock();
  const tick = () => { if(state.active) $("sb-clock").textContent = fmtClock((Date.now() - state.active.startedAt)/1000); };
  tick(); clockInt = setInterval(tick, 1000);
}
function stopClock(){ if(clockInt){ clearInterval(clockInt); clockInt = null; } }

$("btn-finish").onclick = () => {
  const s = state.active; if(!s) return;
  const logged = s.exercises.reduce((n, ex) => n + ex.sets.filter(st => st.done).length, 0);
  if(!confirm("Finish workout? " + logged + " sets logged.")) return;
  s.endedAt = Date.now();
  state.sessions.push(s);
  state.active = null;
  save(); stopClock(); stopRest(); releaseWake();
  show("view-home"); renderHome();
  toast("Workout saved — " + logged + " sets");
};
$("btn-discard").onclick = () => {
  if(!confirm("Discard this workout? Nothing will be saved.")) return;
  state.active = null; save(); stopClock(); stopRest(); releaseWake();
  show("view-home"); renderHome();
};

/* rest timer (timestamp-based) */
function resumeActive(){
  show("view-workout"); renderWorkout(); startClock(); resumeRestIfRunning();
}
function resumeRestIfRunning(){
  const t = parseInt(localStorage.getItem("hitlog.restEndsAt") || "0", 10);
  if(t && t > Date.now()){
    restEndsAt = t;
    $("rest-bar").classList.add("running");
    $("btn-rest").textContent = "Cancel";
    restInt = setInterval(tickRest, 250);
    tickRest();
  }else{
    localStorage.removeItem("hitlog.restEndsAt");
  }
}
$("btn-rest").onclick = () => {
  if(restEndsAt){ stopRest(); return; }
  ensureAudio();
  restEndsAt = Date.now() + REST_SECONDS * 1000;
  localStorage.setItem("hitlog.restEndsAt", String(restEndsAt));
  $("rest-bar").classList.add("running");
  $("btn-rest").textContent = "Cancel";
  restInt = setInterval(tickRest, 250);
  tickRest();
};
function tickRest(){
  const remain = Math.max(0, restEndsAt - Date.now());
  $("rest-time").textContent = fmtClock(Math.ceil(remain/1000));
  $("rest-fill").style.transform = "scaleX(" + (1 - remain/(REST_SECONDS*1000)) + ")";
  if(remain <= 0){
    stopRest(true);
  }
}
function stopRest(finished){
  if(restInt){ clearInterval(restInt); restInt = null; }
  restEndsAt = null;
  localStorage.removeItem("hitlog.restEndsAt");
  const bar = $("rest-bar");
  bar.classList.remove("running");
  $("btn-rest").textContent = "Start rest";
  $("rest-time").textContent = fmtClock(REST_SECONDS);
  $("rest-fill").style.transform = "scaleX(0)";
  if(finished){
    bar.classList.add("flash");
    setTimeout(() => bar.classList.remove("flash"), 2200);
    beep();
    if(navigator.vibrate) navigator.vibrate([300,120,300]);
  }
}
function updateRestUI(){ if(!restEndsAt) $("rest-time").textContent = fmtClock(REST_SECONDS); }

/* audio beep */
let audioCtx = null;
function ensureAudio(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended") audioCtx.resume();
    // play a near-silent tick inside the user gesture to fully unlock audio on iOS
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    g.gain.value = 0.001;
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.05);
  }catch(e){}
}
function beep(){
  if(!audioCtx) return;
  const play = () => {
    try{
      [[0, 880], [.45, 880], [.9, 1175]].forEach(([t, f]) => {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = "square"; o.frequency.value = f;
        g.gain.setValueAtTime(.001, audioCtx.currentTime + t);
        g.gain.exponentialRampToValueAtTime(.6, audioCtx.currentTime + t + .02);
        g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + t + .38);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(audioCtx.currentTime + t); o.stop(audioCtx.currentTime + t + .4);
      });
    }catch(e){}
  };
  try{
    if(audioCtx.state === "suspended"){ audioCtx.resume().then(play).catch(play); }
    else play();
  }catch(e){ play(); }
}

/* wake lock */
$("btn-wake").onclick = async function(){
  if(wakeLock){ releaseWake(); return; }
  try{
    wakeLock = await navigator.wakeLock.request("screen");
    this.textContent = "☀"; toast("Screen will stay awake");
    wakeLock.addEventListener("release", () => { wakeLock = null; $("btn-wake").textContent = "☾"; });
  }catch(e){ toast("Wake lock not available"); }
};
function releaseWake(){ if(wakeLock){ wakeLock.release().catch(()=>{}); wakeLock = null; } $("btn-wake").textContent = "☾"; }
document.addEventListener("visibilitychange", () => {
  if(document.visibilityState === "visible"){
    if(audioCtx && audioCtx.state === "suspended") audioCtx.resume().catch(()=>{});
    if(restEndsAt) tickRest();
    if(state.active) startClock();
  }
});

/* ---------- edit ---------- */
let editWoId = null;
function openEdit(woId){
  editWoId = woId;
  const wo = state.program.find(w => w.id === woId);
  $("edit-title").textContent = wo.name.split(" · ")[0];
  renderEditList();
  show("view-edit");
}
function renderEditList(){
  const wo = state.program.find(w => w.id === editWoId);
  const list = $("edit-list");
  list.innerHTML = "";
  wo.exercises.forEach((ex, i) => {
    const scheme = ex.sets.map(s => (s.type === "warm" ? "(" + s.target + ")" : s.target)).join(" · ");
    const noteBit = ex.note ? " · " + ex.note : "";
    const row = document.createElement("div");
    row.className = "edit-row";
    row.innerHTML =
      '<span class="er-name">' + esc(ex.name) + '<span class="er-scheme">' + esc(scheme) + (ex.repsOnly ? " · reps only" : "") + esc(noteBit) + '</span></span>' +
      '<button class="icon-btn" onclick="moveEx(' + i + ',-1)">↑</button>' +
      '<button class="icon-btn" onclick="moveEx(' + i + ',1)">↓</button>' +
      '<button class="icon-btn" onclick="openExForm(' + i + ')">✎</button>' +
      '<button class="icon-btn" style="color:var(--accent)" onclick="delEx(' + i + ')">✕</button>';
    list.appendChild(row);
  });
}
function moveEx(i, dir){
  const arr = state.program.find(w => w.id === editWoId).exercises;
  const j = i + dir;
  if(j < 0 || j >= arr.length) return;
  [arr[i], arr[j]] = [arr[j], arr[i]];
  save(); renderEditList();
}
function delEx(i){
  const arr = state.program.find(w => w.id === editWoId).exercises;
  if(!confirm("Remove \"" + arr[i].name + "\" from this workout? Its logged history stays in past sessions.")) return;
  arr.splice(i, 1); save(); renderEditList();
}
function openExForm(i){
  const wo = state.program.find(w => w.id === editWoId);
  const ex = i != null && i >= 0 ? wo.exercises[i] : null;
  const warms = ex ? ex.sets.filter(s => s.type === "warm").map(s => s.target).join(", ") : "10";
  const work = ex ? ex.sets.find(s => s.type === "work").target : "6-8";
  openModal(
    '<h3>' + (ex ? "Edit exercise" : "Add exercise") + '</h3>' +
    '<div class="field"><label>Name</label><input id="f-name" value="' + (ex ? esc(ex.name) : "") + '" placeholder="e.g. Incline Machine Press">' +
    (ex ? '<div class="hint">Renaming keeps the exercise history.</div>' : '') + '</div>' +
    '<div class="field"><label>Warm-up set targets (comma-separated, blank for none)</label><input id="f-warm" value="' + esc(warms) + '" placeholder="12, 10"></div>' +
    '<div class="field"><label>Working set target reps</label><input id="f-work" value="' + esc(work) + '" placeholder="6-8"></div>' +
    '<div class="field"><label>Machine settings (optional)</label><input id="f-exnote" value="' + (ex && ex.note ? esc(ex.note) : "") + '" placeholder="e.g. seat 4, pin 7"></div>' +
    '<div class="field"><label><input type="checkbox" id="f-repsonly" style="width:auto" ' + (ex && ex.repsOnly ? "checked" : "") + '> Reps only (no weight, e.g. abs)</label></div>' +
    '<div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button>' +
    '<button class="btn primary" onclick="saveExForm(' + (ex ? i : -1) + ')">Save</button></div>'
  );
}
function saveExForm(i){
  const wo = state.program.find(w => w.id === editWoId);
  const name = $("f-name").value.trim();
  if(!name){ toast("Name required"); return; }
  const warmTargets = $("f-warm").value.split(",").map(s => s.trim()).filter(Boolean);
  const work = $("f-work").value.trim() || "6-8";
  const repsOnly = $("f-repsonly").checked;
  const note = $("f-exnote").value.trim();
  if(i >= 0){
    const ex = wo.exercises[i];
    ex.name = name;
    ex.sets = warmTargets.map(t => ({type:"warm", target:t})).concat([{type:"work", target:work}]);
    ex.repsOnly = repsOnly;
    ex.note = note;
  }else{
    let id = slug(name);
    const allIds = state.program.flatMap(w => w.exercises.map(e => e.id));
    if(allIds.includes(id) && !wo.exercises.some(e => e.id === id)){ /* shared id = shared history, fine */ }
    else if(wo.exercises.some(e => e.id === id)){ id = id + "-" + uid().slice(-4); }
    const nx = mkEx(id, name, warmTargets, work, repsOnly);
    if(note) nx.note = note;
    wo.exercises.push(nx);
  }
  save(); closeModal(); renderEditList();
}
$("btn-add-ex").onclick = () => openExForm(null);
$("btn-edit-back").onclick = () => { show("view-home"); renderHome(); };

/* ---------- modal ---------- */
function openModal(html){ $("modal-body").innerHTML = html; $("modal-wrap").classList.add("open"); }
function closeModal(){ $("modal-wrap").classList.remove("open"); }
$("modal-wrap").addEventListener("click", e => { if(e.target === $("modal-wrap")) closeModal(); });

/* ---------- export / import ---------- */
function exportData(){
  return JSON.stringify({app:"hitlog", version:1, exportedAt:new Date().toISOString(),
    units:"kg", program: state.program, sessions: completedSessions()}, null, 1);
}
$("btn-export").onclick = () => {
  const blob = new Blob([exportData()], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "hitlog-" + fmtDate(new Date()) + ".json";
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
};
$("btn-copy").onclick = async () => {
  try{ await navigator.clipboard.writeText(exportData()); toast("Copied — paste it to Claude"); }
  catch(e){
    openModal('<h3>Copy for Claude</h3><textarea class="io" readonly>' + esc(exportData()) + '</textarea>' +
      '<div class="modal-actions"><button class="btn" onclick="closeModal()">Close</button></div>');
  }
};
$("btn-import").onclick = () => {
  openModal('<h3>Import data</h3><div class="field"><label>Paste a previous export</label>' +
    '<textarea class="io" id="f-import" placeholder="{ ... }"></textarea>' +
    '<div class="hint">This replaces the programme and history on this device.</div></div>' +
    '<div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button>' +
    '<button class="btn primary" onclick="doImport()">Import</button></div>');
};
function doImport(){
  try{
    const data = JSON.parse($("f-import").value);
    if(!data.program || !Array.isArray(data.sessions)) throw new Error("bad format");
    if(!confirm("Replace current programme and " + completedSessions().length + " sessions with imported data?")) return;
    state = {program: data.program, sessions: data.sessions, active: null};
    save(); closeModal(); renderHome(); toast("Imported " + data.sessions.length + " sessions");
  }catch(e){ toast("Couldn't read that JSON"); }
}

/* ---------- boot ---------- */
window.startWorkout = startWorkout; window.openEdit = openEdit; window.setVal = setVal;
window.toggleDone = toggleDone; window.moveEx = moveEx; window.delEx = delEx;
window.openExForm = openExForm; window.saveExForm = saveExForm; window.closeModal = closeModal;
window.deleteSession = deleteSession; window.doImport = doImport; window.resumeActive = resumeActive; window.showForm = showForm; window.editNote = editNote; window.saveNote = saveNote; window.preFocus = preFocus; window.preBlur = preBlur;

renderHome();
if(state.active){
  show("view-workout"); renderWorkout(); startClock();
  resumeRestIfRunning();
  toast("Workout resumed");
}
if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
</script>
